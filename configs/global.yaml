project_name: semeval2026-task13a
task_name: binary_machine_generated_code_detection

seed: 42
primary_metric: macro_f1

paths:
  train: data/raw/train.parquet
  validation: data/raw/validation.parquet
  test: data/raw/test.parquet
  sample_submission: data/raw/sample_submission.csv
  processed_train: data/processed/train_clean.parquet
  processed_test: data/processed/test_clean.parquet
  features_train: data/features/handcrafted_train.parquet
  features_test: data/features/handcrafted_test.parquet

splits:
  random: data/splits/random_stratified_v1.json
  proxy_ood_language: data/splits/lolo_language_v1.json
  proxy_ood_style: data/splits/length_style_bins_v1.json

training:
  num_workers: 4
  save_best_only: true
  early_stopping_patience: 1
  max_epochs_default: 3

logging:
  log_every_n_steps: 50
  save_train_curve: true
  save_confusion_matrix: true
  save_error_cases: true
