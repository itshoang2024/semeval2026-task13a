run_name: run1_tfidf_char_baseline_v1
inherits_from: configs/global.yaml

model:
  type: tfidf_lr
  ngram_range: [3, 5]
  analyzer: char_wb
  max_features: 200000
  classifier: logistic_regression
  C: 4.0
  class_weight: balanced

data:
  text_column: code
  label_column: label

validation:
  schemes:
    - random
    - proxy_ood_language
    - proxy_ood_style

output:
  dir: runs/run1_tfidf_char_baseline_v1
  save_oof: true
  save_submission: true
